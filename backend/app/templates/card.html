<article class="card{{ ' card-fixado' if p.fixado }}">
  <header class="card-topo">
    <h3>{{ p.titulo }}</h3>
    <span class="badge">{{ p.categoria }}</span>
  </header>

  <pre class="texto">{{ p.prompt }}</pre>

  <div class="meta">
    {% for t in p.tags %}<span class="tag">#{{ t }}</span>{% endfor %}
    <time datetime="{{ p.data }}">{{ p.data|data_br }}</time>
  </div>

  {% if p.arquivos %}
  <ul class="anexos">
    {% for a in p.arquivos %}
    <li>
      <button type="button" class="btn-baixar"
              data-url="/api/prompts/{{ p.id }}/arquivos/{{ a.id }}"
              data-nome="{{ a.nome }}"
              title="Baixar {{ a.nome }}">📄 {{ a.nome }} <small>({{ a.tamanho|tamanho_legivel }})</small></button>
      <button type="button" class="btn-x"
              hx-delete="/ui/prompts/{{ p.id }}/arquivos/{{ a.id }}{{ qs_filtro }}"
              hx-target="#lista"
              hx-confirm="Excluir o arquivo "{{ a.nome }}"?"
              title="Excluir arquivo">×</button>
    </li>
    {% endfor %}
  </ul>
  {% endif %}

  <footer class="acoes">
    <div class="acoes-linha">

      <button type="button" class="btn-icon btn-copiar" title="Copiar texto do prompt" aria-label="Copiar">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>

      <button type="button" class="btn-icon btn-exportar-json" data-id="{{ p.id }}"
              title="Exportar JSON completo (inclui anexos)" aria-label="Exportar JSON">
        <svg viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
      </button>

      <button type="button" class="btn-icon btn-editar"
              hx-get="/ui/prompts/{{ p.id }}/editar{{ qs_filtro }}"
              hx-target="closest article"
              hx-swap="outerHTML"
              title="Editar prompt" aria-label="Editar">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
      </button>

      <button type="button" class="btn-icon btn-duplicar"
              hx-post="/ui/prompts/{{ p.id }}/duplicar{{ qs_filtro }}"
              hx-target="#lista"
              title="Duplicar prompt" aria-label="Duplicar">
        <svg viewBox="0 0 24 24"><rect x="8" y="8" width="13" height="13" rx="2"/><path d="M4 16V4a2 2 0 0 1 2-2h12"/></svg>
      </button>

      <button type="button" class="btn-icon{{ ' ativo' if p.fixado }} btn-fixar"
              hx-patch="/ui/prompts/{{ p.id }}/fixar{{ qs_filtro }}"
              hx-target="#lista"
              title="{{ 'Desafixar' if p.fixado else 'Fixar no topo' }}" aria-label="{{ 'Desafixar' if p.fixado else 'Fixar' }}">
        <svg viewBox="0 0 24 24"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-.44-1.24l-2.32-2.9A2 2 0 0 1 15.8 9.86V5a1 1 0 0 0-1-1h-5a1 1 0 0 0-1 1v4.86c0 .42-.13.83-.38 1.15l-2.3 2.87A2 2 0 0 0 4.69 15.22V17z"/></svg>
      </button>

      {% if p.arquivos|length < max_arquivos %}
      <form class="form-anexar"
            hx-post="/ui/prompts/{{ p.id }}/arquivos{{ qs_filtro }}"
            hx-encoding="multipart/form-data"
            hx-target="#lista">
        <label class="btn-icon btn-anexar" title="Anexar arquivo" aria-label="Anexar">
          <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          <input type="file" name="arquivos" multiple hidden
                 accept="{{ accept }}"
                 onchange="if (this.files.length) this.form.requestSubmit()">
        </label>
      </form>
      {% endif %}

      <button type="button" class="btn-icon btn-icon-perigo btn-excluir"
              hx-delete="/ui/prompts/{{ p.id }}{{ qs_filtro }}"
              hx-target="#lista"
              hx-confirm="Excluir o prompt "{{ p.titulo }}"?"
              title="Excluir prompt" aria-label="Excluir">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </button>

    </div>
  </footer>
</article>
