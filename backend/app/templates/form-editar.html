<article class="card card-editando">
  <form hx-post="/ui/prompts/{{ p.id }}/editar{{ qs_filtro }}"
        hx-target="#lista"
        hx-swap="innerHTML">
    <div class="campo-editar">
      <label>Título</label>
      <input type="text" name="titulo" value="{{ p.titulo }}" required maxlength="200">
    </div>
    <div class="campo-editar">
      <label>Categoria</label>
      <input type="text" name="categoria" value="{{ p.categoria }}" maxlength="100">
    </div>
    <div class="campo-editar">
      <label>Tags <small>(separadas por vírgula, máx. 3)</small></label>
      <input type="text" name="tags" value="{{ p.tags | join(', ') }}">
    </div>
    <div class="campo-editar">
      <label>Prompt</label>
      <textarea name="prompt" rows="10" required>{{ p.prompt }}</textarea>
    </div>
    <footer class="acoes">
      <button type="submit" class="btn btn-primario">💾 Salvar</button>
      <button type="button" class="btn"
              hx-get="/ui/prompts{{ qs_filtro }}"
              hx-target="#lista"
              hx-swap="innerHTML">Cancelar</button>
    </footer>
  </form>
</article>
